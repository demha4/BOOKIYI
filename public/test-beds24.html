<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beds24 API Test</title>
  <style>
    body {
      font-family: monospace;
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #0f0;
    }
    h1 { color: #0ff; }
    button {
      background: #0a0;
      color: #000;
      border: none;
      padding: 10px 20px;
      margin: 10px 5px;
      cursor: pointer;
      font-family: monospace;
      font-size: 14px;
    }
    button:hover { background: #0f0; }
    .result {
      background: #000;
      padding: 15px;
      margin: 10px 0;
      border: 1px solid #0f0;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .error { color: #f00; border-color: #f00; }
    .success { color: #0f0; border-color: #0f0; }
    .warning { color: #ff0; border-color: #ff0; }
  </style>
</head>
<body>
  <h1>🔧 Beds24 API Diagnostic Tool</h1>
  <p>This page tests your Beds24 API integration to identify the exact issue.</p>

  <div>
    <button onclick="testPing()">1. Test Ping</button>
    <button onclick="testAvailability()">2. Test Availability</button>
    <button onclick="testRates()">3. Test Rates</button>
    <button onclick="testDirect()">4. Test Direct (V1)</button>
    <button onclick="clearResults()">Clear</button>
  </div>

  <div id="results"></div>

  <script>
    const results = document.getElementById('results');

    function log(message, type = 'success') {
      const div = document.createElement('div');
      div.className = `result ${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      results.appendChild(div);
      results.scrollTop = results.scrollHeight;
    }

    function clearResults() {
      results.innerHTML = '';
    }

    async function testPing() {
      log('Testing /api/beds24?action=ping...', 'warning');
      try {
        const res = await fetch('/api/beds24?action=ping');
        const data = await res.json();
        log(`✅ Ping response:\n${JSON.stringify(data, null, 2)}`, 'success');
      } catch (err) {
        log(`❌ Ping failed:\n${err.message}\n${err.stack}`, 'error');
      }
    }

    async function testAvailability() {
      log('Testing /api/beds24?action=availability...', 'warning');
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const dayAfter = new Date(tomorrow);
      dayAfter.setDate(dayAfter.getDate() + 1);
      
      const checkIn = tomorrow.toISOString().slice(0, 10);
      const checkOut = dayAfter.toISOString().slice(0, 10);

      try {
        const url = `/api/beds24?action=availability&checkIn=${checkIn}&checkOut=${checkOut}`;
        log(`URL: ${url}`, 'warning');
        
        const res = await fetch(url);
        const text = await res.text();
        
        log(`Status: ${res.status} ${res.statusText}`, res.ok ? 'success' : 'error');
        
        try {
          const data = JSON.parse(text);
          log(`✅ Availability response:\n${JSON.stringify(data, null, 2)}`, 'success');
        } catch {
          log(`❌ Response is not JSON:\n${text.substring(0, 500)}...`, 'error');
        }
      } catch (err) {
        log(`❌ Availability failed:\n${err.message}`, 'error');
      }
    }

    async function testRates() {
      log('Testing /api/beds24?action=rates...', 'warning');
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const dayAfter = new Date(tomorrow);
      dayAfter.setDate(dayAfter.getDate() + 1);
      
      const checkIn = tomorrow.toISOString().slice(0, 10);
      const checkOut = dayAfter.toISOString().slice(0, 10);

      try {
        const url = `/api/beds24?action=rates&checkIn=${checkIn}&checkOut=${checkOut}&numAdults=1`;
        log(`URL: ${url}`, 'warning');
        
        const res = await fetch(url);
        const text = await res.text();
        
        log(`Status: ${res.status} ${res.statusText}`, res.ok ? 'success' : 'error');
        
        try {
          const data = JSON.parse(text);
          log(`✅ Rates response:\n${JSON.stringify(data, null, 2)}`, 'success');
        } catch {
          log(`❌ Response is not JSON:\n${text.substring(0, 500)}...`, 'error');
        }
      } catch (err) {
        log(`❌ Rates failed:\n${err.message}`, 'error');
      }
    }

    async function testDirect() {
      log('Testing Beds24 V1 API directly (from browser)...', 'warning');
      log('⚠️ This will likely fail with CORS error (expected)', 'warning');
      
      try {
        const res = await fetch('https://api.beds24.com/json/getProperty', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            propKey: '309994_c899dbfecb010174618f9d942595a9b9f09fa5a250a1b0fa',
            propertyId: 309994,
            includeRooms: true
          })
        });
        const data = await res.json();
        log(`✅ Direct API works:\n${JSON.stringify(data, null, 2)}`, 'success');
      } catch (err) {
        if (err.message.includes('CORS')) {
          log(`✅ CORS error (expected) - this means Beds24 is reachable:\n${err.message}`, 'warning');
        } else {
          log(`❌ Direct API failed:\n${err.message}`, 'error');
        }
      }
    }

    // Auto-run ping test on load
    window.addEventListener('load', () => {
      setTimeout(testPing, 500);
    });
  </script>
</body>
</html>
